<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    
    <!-- สไตล์การตกแต่ง (CSS) เพิ่มความสวยงาม เรียบหรู ทันสมัย -->
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
            width: 100%;
            margin-bottom: 24px;
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        #webcam-container {
            margin: 0 auto 24px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #e2e8f0;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam-container canvas {
            display: block;
        }

        #label-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .prediction-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f1f5f9;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
        }

        .class-name {
            color: var(--text-main);
        }

        .probability {
            color: var(--primary-color);
            font-weight: 700;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Teachable Machine</h1>
        <div class="subtitle">ระบบตรวจจับรูปภาพด้วย AI จากกล้องเว็บแคม</div>
        
        <button type="button" class="btn-start" onclick="init()">เปิดกล้องและเริ่มใช้งาน</button>
        
        <div id="webcam-container">
            <!-- กล้องเว็บแคมจะแสดงตรงนี้หลังจากกดปุ่ม -->
        </div>
        
        <div id="label-container">
            <!-- ผลลัพธ์การทำนายจะแสดงตรงนี้ -->
        </div>
    </div>

    <!-- Scripts สำหรับเรียกใช้งาน TensorFlow.js และ Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // ลิงก์โมเดลของคุณจาก Teachable Machine
        const URL = "https://teachablemachine.withgoogle.com/models/r7Xk4dZhe/";

        let model, webcam, labelContainer, maxPredictions;

        // ฟังก์ชันเริ่มต้นระบบ โหลดโมเดล และตั้งค่าเว็บแคม
        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // โหลดโมเดล
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // ตั้งค่าเว็บแคม (ขนาด 200x200px, พลิกซ้ายขวาให้เหมือนกระจกเงา)
            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            
            await webcam.setup(); // ขอสิทธิ์เข้าถึงกล้อง
            await webcam.play();
            window.requestAnimationFrame(loop);

            // แสดงหน้าจอเว็บแคมในเว็บ
            const webcamContainer = document.getElementById("webcam-container");
            webcamContainer.innerHTML = ""; // เคลียร์ข้อความเก่า (ถ้ามี)
            webcamContainer.appendChild(webcam.canvas);
            
            // เตรียมพื้นที่สำหรับแสดงเปอร์เซ็นต์ผลการทำนาย
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // เคลียร์ผลเก่าก่อนสร้างใหม่
            for (let i = 0; i < maxPredictions; i++) {
                const row = document.createElement("div");
                row.className = "prediction-row";
                row.innerHTML = `<span class="class-name">-</span><span class="probability">0.00</span>`;
                labelContainer.appendChild(row);
            }
        }

        // ฟังก์ชันลูปทำงานต่อเนื่องเพื่ออัปเดตเฟรมภาพจากกล้อง
        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        // ฟังก์ชันส่งภาพจากเว็บแคมไปให้ AI ประมวลผลและแสดงค่าออกมา
        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability.toFixed(2);
                
                // อัปเดตชื่อคลาสและคะแนนความน่าจะเป็นลงใน UI ที่จัดไว้
                const row = labelContainer.childNodes[i];
                row.querySelector('.class-name').textContent = className;
                row.querySelector('.probability').textContent = probability;
            }
        }
    </script>
</body>
</html>
